<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Dashboard Anamnesis</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:1200px;margin:0 auto}.header{background:white;padding:30px;border-radius:12px;margin-bottom:30px;box-shadow:0 10px 30px rgba(0,0,0,0.1)}.header h1{color:#333}.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:20px}.stat-card{background:linear-gradient(135deg,#667eea,#764ba2);color:white;padding:15px;border-radius:8px;text-align:center}.stat-number{font-size:28px;font-weight:bold}.table-wrapper{background:white;border-radius:12px;box-shadow:0 10px 30px rgba(0,0,0,0.1);overflow:hidden}table{width:100%;border-collapse:collapse}th,td{padding:12px 20px;text-align:left;border-bottom:1px solid #eee}th{background:#f8f9fa;font-weight:600}tbody tr:hover{background:#f8f9fa}.loading{text-align:center;padding:40px;color:#666}.error{background:#f8d7da;color:#721c24;padding:20px;border-radius:8px;margin-bottom:20px}.btn{background:#667eea;color:white;border:none;padding:10px 20px;border-radius:6px;cursor:pointer;margin-bottom:20px}</style></head><body><div class="container"><div class="header"><h1>📋 Dashboard Anamnesis</h1><p>Camila Lagos - Datos en tiempo real</p><button class="btn" onclick="cargarDatos()">🔄 Actualizar</button><div class="stats"><div class="stat-card"><div class="stat-number" id="totalPacientes">0</div><div>Total Pacientes</div></div><div class="stat-card"><div class="stat-number" id="promEdad">0</div><div>Edad Promedio</div></div><div class="stat-card"><div class="stat-number" id="promPeso">0</div><div>Peso Promedio</div></div><div class="stat-card"><div class="stat-number" id="promEstres">0</div><div>Estrés Promedio</div></div></div></div><div class="table-wrapper"><div style="padding:20px"><h2>Listado de Pacientes</h2></div><div id="errorContainer"></div><div id="loadingContainer" class="loading">Cargando datos...</div><table id="dataTable" style="display:none"><thead><tr><th>Fecha</th><th>Paciente</th><th>Email</th><th>Edad</th><th>Peso</th><th>Estrés</th></tr></thead><tbody id="dataBody"></tbody></table></div></div><script>async function cargarDatos(){try{document.getElementById('loadingContainer').style.display='block';document.getElementById('errorContainer').innerHTML='';const r=await fetch('https://dnlvzwrujosuckdzmffx.supabase.co/functions/v1/get-anamnesis-data');const d=await r.json();if(!Array.isArray(d))throw new Error('Error');const tb=document.getElementById('dataBody');tb.innerHTML='';d.forEach(x=>{const tr=document.createElement('tr');tr.innerHTML='<td>'+new Date(x.created_at).toLocaleDateString('es-CL')+'</td><td>'+x.nombre_completo+'</td><td>'+x.email_paciente+'</td><td>'+(x.edad||'-')+'</td><td>'+(x.peso_kg||'-')+'</td><td>'+(x.nivel_estres||'-')+'/5</td>';tb.appendChild(tr)});document.getElementById('dataTable').style.display='table';document.getElementById('totalPacientes').textContent=d.length;const edades=d.map(x=>x.edad).filter(x=>x);const pesos=d.map(x=>x.peso_kg).filter(x=>x);const estres=d.map(x=>x.nivel_estres).filter(x=>x);document.getElementById('promEdad').textContent=edades.length?(edades.reduce((a,b)=>a+b)/edades.length).toFixed(0):0;document.getElementById('promPeso').textContent=pesos.length?(pesos.reduce((a,b)=>a+b)/pesos.length).toFixed(1):0;document.getElementById('promEstres').textContent=estres.length?(estres.reduce((a,b)=>a+b)/estres.length).toFixed(1):0}catch(e){document.getElementById('errorContainer').innerHTML='<div class="error">Error: '+e.message+'</div>'}finally{document.getElementById('loadingContainer').style.display='none'}}cargarDatos()</script></body></html>
