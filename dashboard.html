<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Anamnesis - Camila Lagos</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }
    .container {
      max-width: 1400px;
      margin: 0 auto;
    }
    .header {
      background: white;
      padding: 30px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }
    .header h1 { color: #333; margin-bottom: 5px; }
    .header p { color: #666; font-size: 14px; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-top: 20px;
    }
    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .stat-number { font-size: 28px; font-weight: bold; }
    .stat-label { font-size: 12px; opacity: 0.9; }
    .table-wrapper {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      overflow: hidden;
    }
    .table-header {
      background: #f8f9fa;
      padding: 20px;
      border-bottom: 1px solid #e9ecef;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th {
      text-align: left;
      padding: 12px 20px;
      background: #f8f9fa;
      color: #333;
      font-weight: 600;
      border-bottom: 2px solid #e9ecef;
    }
    td {
      padding: 12px 20px;
      border-bottom: 1px solid #e9ecef;
    }
    tbody tr:hover {
      background: #f8f9fa;
    }
    .email-link { color: #667eea; text-decoration: none; }
    .email-link:hover { text-decoration: underline; }
    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }
    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 20px;
      border-radius: 8px;
      margin-bottom: 20px;
    }
    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.5);
    }
    .modal-content {
      background-color: white;
      margin: 5% auto;
      padding: 30px;
      border: 1px solid #888;
      width: 90%;
      max-width: 600px;
      border-radius: 12px;
      max-height: 80vh;
      overflow-y: auto;
    }
    .close {
      color: #aaa;
      float: right;
      font-size: 28px;
      font-weight: bold;
      cursor: pointer;
    }
    .close:hover { color: black; }
    .modal-section {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #eee;
    }
    .modal-section h3 {
      color: #667eea;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    .modal-section p {
      color: #333;
      font-size: 13px;
      line-height: 1.6;
    }
    .row-link {
      cursor: pointer;
      color: #667eea;
    }
    .row-link:hover {
      text-decoration: underline;
    }
    .refresh-btn {
      background: #667eea;
      color: white;
      border: none;
      padding: 10px 20px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      margin-bottom: 20px;
    }
    .refresh-btn:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📋 Dashboard de Anamnesis Nutricional</h1>
      <p>Camila Lagos Madrid - Datos de pacientes en tiempo real</p>
      <button class="refresh-btn" onclick="cargarDatos()">🔄 Actualizar</button>
      <div class="stats">
        <div class="stat-card">
          <div class="stat-number" id="totalPacientes">0</div>
          <div class="stat-label">Total de Pacientes</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="promEdad">0</div>
          <div class="stat-label">Edad Promedio</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="promPeso">0</div>
          <div class="stat-label">Peso Promedio (kg)</div>
        </div>
        <div class="stat-card">
          <div class="stat-number" id="promEstres">0</div>
          <div class="stat-label">Nivel Estrés Promedio</div>
        </div>
      </div>
    </div>

    <div class="table-wrapper">
      <div class="table-header">
        <h2>Listado de Pacientes</h2>
      </div>
      <div id="errorContainer"></div>
      <div id="loadingContainer" class="loading">Cargando datos...</div>
      <table id="dataTable" style="display:none;">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Paciente</th>
            <th>Email</th>
            <th>Edad</th>
            <th>Peso (kg)</th>
            <th>Talla (cm)</th>
            <th>Estrés</th>
            <th>Acción</th>
          </tr>
        </thead>
        <tbody id="dataBody"></tbody>
      </table>
    </div>
  </div>

  <div id="detalleModal" class="modal">
    <div class="modal-content">
      <span class="close" onclick="cerrarModal()">&times;</span>
      <div id="detalleContent"></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://dnlvzwrujosuckdzmffx.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRubHZ6d3J1am9zdWNremRtZmZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3MDk4MjE2MzUsImV4cCI6MTkyNTQwMTYzNX0.J5gBz0w3h_jC3bw0OUXzvPf-m1a0Q-L0A0VZjx4t1Pg';

    async function cargarDatos() {
      try {
        document.getElementById('loadingContainer').style.display = 'block';
        document.getElementById('errorContainer').innerHTML = '';
        
        const response = await fetch(`${SUPABASE_URL}/rest/v1/anamnesis_nutricion?order=created_at.desc`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        if (!response.ok) throw new Error('Error al cargar datos');
        
        const datos = await response.json();
        mostrarDatos(datos);
        actualizarEstadisticas(datos);
      } catch (error) {
        document.getElementById('errorContainer').innerHTML = `
          <div class="error">❌ Error: ${error.message}</div>
        `;
      } finally {
        document.getElementById('loadingContainer').style.display = 'none';
      }
    }

    function mostrarDatos(datos) {
      const tbody = document.getElementById('dataBody');
      tbody.innerHTML = '';
      
      datos.forEach(row => {
        const fecha = new Date(row.created_at).toLocaleDateString('es-CL');
        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td>${fecha}</td>
          <td><strong>${row.nombre_completo}</strong></td>
          <td><a href="mailto:${row.email_paciente}" class="email-link">${row.email_paciente}</a></td>
          <td>${row.edad || '-'}</td>
          <td>${row.peso_kg || '-'}</td>
          <td>${row.talla_cm || '-'}</td>
          <td>${row.nivel_estres || '-'}/5</td>
          <td><span class="row-link" onclick="mostrarDetalle('${row.id}')">Ver detalles →</span></td>
        `;
        tbody.appendChild(tr);
      });

      document.getElementById('dataTable').style.display = 'table';
    }

    function actualizarEstadisticas(datos) {
      document.getElementById('totalPacientes').textContent = datos.length;
      
      const edades = datos.map(d => d.edad).filter(e => e);
      const promEdad = edades.length > 0 ? (edades.reduce((a, b) => a + b, 0) / edades.length).toFixed(0) : 0;
      document.getElementById('promEdad').textContent = promEdad;
      
      const pesos = datos.map(d => d.peso_kg).filter(p => p);
      const promPeso = pesos.length > 0 ? (pesos.reduce((a, b) => a + b, 0) / pesos.length).toFixed(1) : 0;
      document.getElementById('promPeso').textContent = promPeso;
      
      const estres = datos.map(d => d.nivel_estres).filter(e => e);
      const promEstres = estres.length > 0 ? (estres.reduce((a, b) => a + b, 0) / estres.length).toFixed(1) : 0;
      document.getElementById('promEstres').textContent = promEstres;
    }

    async function mostrarDetalle(id) {
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/anamnesis_nutricion?id=eq.${id}`, {
          headers: {
            'apikey': SUPABASE_KEY,
            'Authorization': `Bearer ${SUPABASE_KEY}`
          }
        });

        const datos = await response.json();
        if (datos.length === 0) return;
        
        const row = datos[0];
        const html = `
          <h2>${row.nombre_completo}</h2>
          
          <div class="modal-section">
            <h3>📧 Contacto</h3>
            <p><strong>Email:</strong> ${row.email_paciente}</p>
            <p><strong>Ocupación:</strong> ${row.ocupacion || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>📏 Datos Antropométricos</h3>
            <p><strong>Edad:</strong> ${row.edad} años</p>
            <p><strong>Sexo:</strong> ${row.sexo_biologico || '-'}</p>
            <p><strong>Peso:</strong> ${row.peso_kg} kg</p>
            <p><strong>Talla:</strong> ${row.talla_cm} cm</p>
          </div>

          <div class="modal-section">
            <h3>🎯 Motivo de Consulta</h3>
            <p>${row.motivo_consulta}</p>
            <p><strong>Objetivo:</strong> ${row.objetivo_principal || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>🏥 Antecedentes</h3>
            <p><strong>Patologías:</strong> ${Array.isArray(row.patologias) && row.patologias.length > 0 ? row.patologias.join(', ') : 'Ninguna'}</p>
            <p><strong>Medicamentos:</strong> ${row.medicamentos_suplementos || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>🍽️ Hábitos Alimentarios</h3>
            <p><strong>Comidas/día:</strong> ${row.comidas_dia || '-'}</p>
            <p><strong>Agua/día:</strong> ${row.consumo_agua || '-'}</p>
            <p><strong>Cocina en casa:</strong> ${row.cocina_en_casa || '-'}</p>
            <p><strong>NO consume:</strong> ${row.alimentos_no_consume || '-'}</p>
            <p><strong>Favoritos:</strong> ${row.alimentos_favoritos || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>💪 Actividad Física</h3>
            <p><strong>Frecuencia:</strong> ${row.realiza_actividad_fisica || '-'}</p>
            <p><strong>Tipo:</strong> ${Array.isArray(row.tipo_actividad) && row.tipo_actividad.length > 0 ? row.tipo_actividad.join(', ') : '-'}</p>
          </div>

          <div class="modal-section">
            <h3>😴 Sueño y Estrés</h3>
            <p><strong>Horas de sueño:</strong> ${row.horas_sueno || '-'}</p>
            <p><strong>Nivel de estrés:</strong> ${row.nivel_estres}/5</p>
            <p><strong>Ansiedad por comida:</strong> ${row.ansiedad_comida || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>📚 Historia Alimentaria</h3>
            <p><strong>Dietas previas:</strong> ${Array.isArray(row.dietas_previas) && row.dietas_previas.length > 0 ? row.dietas_previas.join(', ') : 'Ninguna'}</p>
            <p><strong>Experiencia:</strong> ${row.experiencia_dietas || '-'}</p>
          </div>

          <div class="modal-section">
            <h3>💬 Comentarios Adicionales</h3>
            <p>${row.comentarios_adicionales || 'Ninguno'}</p>
          </div>
        `;
        
        document.getElementById('detalleContent').innerHTML = html;
        document.getElementById('detalleModal').style.display = 'block';
      } catch (error) {
        alert('Error: ' + error.message);
      }
    }

    function cerrarModal() {
      document.getElementById('detalleModal').style.display = 'none';
    }

    window.onclick = function(event) {
      const modal = document.getElementById('detalleModal');
      if (event.target == modal) {
        modal.style.display = 'none';
      }
    }

    cargarDatos();
  </script>
</body>
</html>
